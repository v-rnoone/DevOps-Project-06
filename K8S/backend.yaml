apiVersion: apps/v1
kind: Deployment
metadata:
  name: quote-backend
  namespace: quote-app
spec:
  replicas: 3
  selector:
    matchLabels:
      app: quote-backend
  template:
    metadata:
      labels:
        app: quote-backend
    spec:
      containers:
        - name: quote-backend
          image: quoteregistry.azurecr.io/quote-app-backend:b228e4d2b1106ee1019674c69cfc654d7ba7b8a8
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: quote-app-config
            - secretRef:
                name: quote-app-secret
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: quote-backend-service
  namespace: quote-app
spec:
  selector:
    app: quote-backend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
